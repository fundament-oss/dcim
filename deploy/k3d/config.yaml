apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: dcim
servers: 1
agents: 0
ports:
  - port: 11080:80
    nodeFilters:
      - loadbalancer
  - port: 11443:30443
    nodeFilters:
      - loadbalancer
  - port: 11432:11432
    nodeFilters:
      - loadbalancer
options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*
registries:
  create:
    name: "registry-dcim.localhost"
    host: "0.0.0.0"
    hostPort: "5112"
  config: |
    mirrors:
      "localhost:5112":
        endpoint:
          - http://registry-dcim.localhost:5000
volumes:
  - volume: ${PWD}/deploy/k3d/resources/cloudnative-pg.yaml:/var/lib/rancher/k3s/server/manifests/cloudnative-pg.yaml
  - volume: ${PWD}/deploy/k3d/resources/ingress-nginx.yaml:/var/lib/rancher/k3s/server/manifests/ingress-nginx.yaml
  - volume: ${PWD}/deploy/k3d/resources/reloader.yaml:/var/lib/rancher/k3s/server/manifests/reloader.yaml
