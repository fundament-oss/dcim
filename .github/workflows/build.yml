name: Build

on:
  push:
    branches: [master]
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
      - ready_for_review
      - converted_to_draft
      - labeled
      - unlabeled
    branches: [master]

concurrency:
  group: build-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOMAIN: dcim.digilab.reviews
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/dcim
  PR_NUMBER: ${{ github.event.number }}

permissions: {}

jobs:
  gate:
    runs-on: ubuntu-24.04
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      should_teardown: ${{ steps.check.outputs.should_teardown }}
    steps:
      - id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          ACTION: ${{ github.event.action }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          LABEL_NAME: ${{ github.event.label.name }}
          HAS_SKIP_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'no-preview-env') }}
        run: |
          should_deploy=false
          should_teardown=false

          if [ "$EVENT_NAME" = "pull_request" ]; then
            case "$ACTION" in
              closed|converted_to_draft)
                should_teardown=true
                ;;
              labeled)
                [ "$LABEL_NAME" = "no-preview-env" ] && should_teardown=true
                ;;
              opened|reopened|synchronize|ready_for_review|unlabeled)
                if [ "$IS_DRAFT" = "false" ] && [ "$HAS_SKIP_LABEL" = "false" ]; then
                  should_deploy=true
                fi
                ;;
            esac
          fi

          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"
          echo "should_teardown=$should_teardown" >> "$GITHUB_OUTPUT"

  build:
    needs: gate
    if: github.event_name == 'push' || needs.gate.outputs.should_deploy == 'true'
    strategy:
      matrix:
        include:
          - image-name: api
            dockerfile: api/Dockerfile
            context: "."
          - image-name: db-migrations
            dockerfile: db/Dockerfile
            context: db
          - image-name: frontend
            dockerfile: frontend/Dockerfile
            context: "."
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-image.yml
    secrets: inherit
    with:
      image-name: ${{ matrix.image-name }}
      dockerfile: ${{ matrix.dockerfile }}
      context: ${{ matrix.context }}

  deploy:
    needs: [gate, build]
    if: needs.gate.outputs.should_deploy == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    env:
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - uses: actions/checkout@v5

      - name: Compute image tag
        run: |
          REF_NAME=$(echo '${{ github.ref_name }}' | tr '/' '-')
          echo "IMAGE_TAG=${{ github.sha }}-${REF_NAME}-${{ github.run_number }}" >> $GITHUB_ENV

      - name: Clone Flux repo
        run: |
          git clone --depth 1 "https://oauth2:${{ secrets.GITLAB_TOKEN }}@${{ vars.GITLAB_REPO_HOST }}/${{ vars.GITLAB_REPO_PATH }}.git" flux-repo
          cd flux-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate PR overlay
        run: |
          PR_DIR="flux-repo/apps/dcim/overlays/pr/pr-${PR_NUMBER}"
          mkdir -p "$PR_DIR"

          export PR_NUM="$PR_NUMBER"
          export PR_BRANCH="$PR_BRANCH"
          export DOMAIN="$DOMAIN"
          export IMAGE_PREFIX="$IMAGE_PREFIX"
          export IMAGE_TAG="$IMAGE_TAG"

          envsubst '${PR_NUM} ${PR_BRANCH} ${DOMAIN} ${IMAGE_PREFIX} ${IMAGE_TAG}' \
            < charts/dcim/pr-overlay.yaml \
            > "$PR_DIR/resources.yaml"

      - name: Update kustomization.yaml
        run: |
          cd flux-repo
          KUSTOMIZATION="apps/dcim/overlays/pr/kustomization.yaml"

          # Create base kustomization if it doesn't exist
          if [ ! -f "$KUSTOMIZATION" ]; then
            mkdir -p "$(dirname "$KUSTOMIZATION")"
            cat > "$KUSTOMIZATION" << 'EOF'
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          resources:
          EOF
          fi

          # Add PR resource entry if not already present
          PR_ENTRY="pr-${PR_NUMBER}/resources.yaml"
          if ! grep -q "$PR_ENTRY" "$KUSTOMIZATION"; then
            echo "  - $PR_ENTRY" >> "$KUSTOMIZATION"
          fi

      - name: Commit and push
        run: |
          cd flux-repo
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "deploy: PR #${PR_NUMBER} environment

          Commit: ${IMAGE_TAG}
          Branch: ${PR_BRANCH}"
            git push
          fi

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-environment
          message: |
            ## PR Environment

            | Service | URL |
            |---------|-----|
            | Console | https://console.pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }} |
            | API | https://api.pr${{ env.PR_NUMBER }}.${{ env.DOMAIN }} |

            **Commit:** `${{ env.IMAGE_TAG }}`
            **Namespace:** `tn-dcim-pr-${{ env.PR_NUMBER }}`

            > Environment will be ready once Flux reconciles (~5 min after images are built).

  teardown:
    needs: gate
    if: needs.gate.outputs.should_teardown == 'true'
    runs-on: ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - name: Clone Flux repo
        run: |
          git clone --depth 1 "https://oauth2:${{ secrets.GITLAB_TOKEN }}@${{ vars.GITLAB_REPO_HOST }}/${{ vars.GITLAB_REPO_PATH }}.git" flux-repo
          cd flux-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Remove PR overlay
        run: |
          cd flux-repo
          PR_DIR="apps/dcim/overlays/pr/pr-${PR_NUMBER}"

          # Remove PR directory
          rm -rf "$PR_DIR"

          # Remove entry from kustomization.yaml
          KUSTOMIZATION="apps/dcim/overlays/pr/kustomization.yaml"
          if [ -f "$KUSTOMIZATION" ]; then
            sed -i "\|pr-${PR_NUMBER}/resources.yaml|d" "$KUSTOMIZATION"
          fi

      - name: Commit and push
        run: |
          cd flux-repo
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "teardown: PR #${PR_NUMBER} environment"
            git push
          fi

      - name: Update PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-environment
          message: |
            ## PR Environment - Torn Down

            The environment for this PR has been removed.
