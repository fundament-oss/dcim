apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: dcim

# Build configuration for all images
build:
  # Local build settings - load directly into k3d (no registry needed)
  local:
    useBuildkit: true
    concurrency: 0
    push: true

  artifacts:
    - image: api
      context: .
      docker:
        dockerfile: api/Dockerfile

    - image: db-migrations
      context: db
      docker:
        dockerfile: Dockerfile

    - image: frontend
      context: .
      docker:
        dockerfile: frontend/Dockerfile
        buildArgs:
          APP_CONFIGURATION: development

deploy:
  kubeContext: REQUIRES-PROFILE # kubeContext is intentionally invalid to prevent accidental deployments without a profile.
  statusCheck: true
  statusCheckDeadlineSeconds: 300
  tolerateFailuresUntilDeadline: true
  helm:
    releases:
      - name: dcim
        chartPath: charts/dcim
        namespace: dcim
        createNamespace: true
        setValueTemplates:
          images.dbMigrations: "{{.IMAGE_FULLY_QUALIFIED_db_migrations}}"
          images.api: "{{.IMAGE_FULLY_QUALIFIED_api}}"
          images.frontend: "{{.IMAGE_FULLY_QUALIFIED_frontend}}"

profiles:
  - name: env-local
    deploy:
      kubeContext: k3d-dcim
    patches:
      - op: add
        path: /deploy/helm/releases/0/valuesFiles
        value:
          - charts/dcim/values-local.yaml

  # Hot reload profile for local development
  - name: hotreload
    patches:
      - op: replace
        path: /build/artifacts/0/docker/dockerfile
        value: api/hotreload/Dockerfile
      - op: add
        path: /build/artifacts/0/sync
        value: {}
      - op: replace
        path: /build/artifacts/2/docker/dockerfile
        value: frontend/hotreload/Dockerfile
      - op: add
        path: /build/artifacts/2/sync
        value: {}

  - name: env-production
    deploy:
      kubeContext: PRODUCTION-NOT-AVAILABLE-YET
    patches:
      - op: add
        path: /deploy/helm/releases/0/valuesFiles
        value:
          - charts/dcim/values-production.yaml
